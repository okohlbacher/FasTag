name: build

# Six targets: {Linux, macOS, Windows} x {x64, arm64}.
#
# OpenMS availability is the constraint, not FasTag. bioconda ships OpenMS 3.5.0
# for linux-64, linux-aarch64, osx-64 and osx-arm64, so those four install a
# binary and build in minutes. There is no Windows conda package and the Windows
# installer carries no SDK, so Windows must build OpenMS from source -- slow,
# cached, and non-blocking until it is proven.
#
# Every job VERIFIES that OpenMSConfig.cmake actually exists before configuring.
# A package that ships tools but no development files would otherwise fail deep
# inside CMake with a misleading error.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# cancel-in-progress is deliberately OFF.
#
# It is the usual default and it starved a job here. macos-13 is the last Intel
# runner and is scarce, so macos-x64 sat queued while every subsequent push
# cancelled the run out from under it -- across six consecutive runs it never
# executed once, and an untested platform sat in the matrix looking merely
# "queued" rather than unverified.
#
# This repo does not have the traffic to need aggressive cancellation, and a
# stale run finishing is cheaper than a platform silently never being built.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------- conda path
  unix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64,   runner: ubuntu-24.04 }
          - { name: linux-arm64, runner: ubuntu-24.04-arm }
          - { name: macos-x64,   runner: macos-13 }
          - { name: macos-arm64, runner: macos-14 }

    steps:
      - uses: actions/checkout@v4

      # Two dependencies OpenMSConfig.cmake needs but the openms package does not
      # pull in. Both were invisible locally, where contrib had already provided
      # them, and both broke immediately on a clean machine:
      #
      #   libboost-headers  OpenMS/config.h is public and does
      #                     #include <boost/current_function.hpp>, so every
      #                     downstream translation unit needs Boost headers
      #   qt6-main          OpenMSConfig.cmake does find_dependency(Qt6). The
      #                     env otherwise has a Qt6Config.cmake that sets
      #                     Qt6_FOUND=FALSE -- present but incomplete, which
      #                     reads as a confusing "found but not found"
      #
      # linux-x64 passed without qt6-main and the ARM/macOS runners did not, so
      # the base image differs by platform. Requesting it explicitly removes the
      # dependence on whatever the runner happens to ship.
      - name: Install OpenMS from bioconda
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: fastag
          create-args: >-
            openms>=3.5
            libboost-headers
            qt6-main
            cmake
            ninja
            cxx-compiler
          condarc: |
            channels:
              - conda-forge
              - bioconda
          init-shell: bash
          cache-environment: true

      - name: Verify OpenMS ships development files
        shell: bash -el {0}
        run: |
          # A package with tools but no headers/CMake config would otherwise fail
          # deep inside find_package with an unhelpful message.
          CFG=$(find "$CONDA_PREFIX" -name 'OpenMSConfig.cmake' 2>/dev/null | head -1)
          if [ -z "$CFG" ]; then
            echo "::error::OpenMS conda package provides no OpenMSConfig.cmake."
            echo "Contents under lib/cmake:"; ls -la "$CONDA_PREFIX"/lib/cmake 2>/dev/null || true
            exit 1
          fi
          echo "OpenMSConfig.cmake: $CFG"
          echo "OPENMS_DIR=$(dirname "$CFG")" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash -el {0}
        run: |
          # Eigen3 needs the shim this repo already ships.
          #
          # OpenMSConfig.cmake does find_dependency(Eigen3 3.4.0...<6). Eigen 3.4's
          # own config-version file enforces same-major-version and rejects any
          # range whose maximum crosses 4, so a perfectly good Eigen 3.4.0 is
          # refused and configuration dies before OpenMS's fallback can run. It is
          # the first thing CI hit, on every platform.
          #
          # README.md documented this and cmake/eigen3-range-shim existed; the
          # first CI attempt simply failed to use it. Passing it unconditionally
          # is harmless where Eigen behaves, and this is exactly the sort of
          # environment-specific breakage CI is meant to catch for new users.
          # QT_HOST_PATH is required on the ARM runners and harmless elsewhere.
          #
          # conda-forge's Qt6 for aarch64 and osx-arm64 is marked as a
          # cross-compiled Qt, so Qt6Config.cmake refuses to load without a host
          # Qt: "To use a cross-compiled Qt, please set the QT_HOST_PATH cache
          # variable". The build here is native, so the same prefix IS the host
          # Qt. linux-x64 is unaffected, which is why this only appeared on ARM.
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenMS_DIR="$OPENMS_DIR" \
            -DCMAKE_PREFIX_PATH="$CONDA_PREFIX" \
            -DQT_HOST_PATH="$CONDA_PREFIX" \
            -DEigen3_DIR="$PWD/cmake/eigen3-range-shim" \
            -DEIGEN3_INCLUDE_DIR="$CONDA_PREFIX/include/eigen3"

      - name: Build
        shell: bash -el {0}
        run: cmake --build build --parallel

      - name: Test
        shell: bash -el {0}
        run: ctest --test-dir build --output-on-failure

      - name: Smoke-test the binary
        shell: bash -el {0}
        run: ./build/FasTag --help

      - uses: actions/upload-artifact@v4
        with:
          name: FasTag-${{ matrix.name }}
          path: build/FasTag
          if-no-files-found: error

  # -------------------------------------------------------------- Windows path
  #
  # No OpenMS conda package and no SDK in the installer, so OpenMS is built from
  # source. Expensive; cached on the OpenMS revision so it is paid once.
  #
  # Non-blocking (continue-on-error) until it has passed at least once: a target
  # that has never worked should not gate merges to the four that do.
  windows:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: windows-x64,   runner: windows-2022,   arch: amd64 }
          - { name: windows-arm64, runner: windows-11-arm, arch: arm64 }

    env:
      OPENMS_TAG: release/3.5.0

    steps:
      - uses: actions/checkout@v4

      # OpenMS contrib needs the MSVC developer environment, not merely a
      # compiler CMake can find. Its CMakeLists shells out to cl.exe to decide
      # the target word size and fails with "Could not determine if cl.exe builds
      # x86 or x64 apps" when cl is not on PATH -- which is the state a bare
      # cmake invocation leaves it in, even though CMake itself locates MSVC.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Cache the OpenMS build
        id: openms-cache
        uses: actions/cache@v4
        with:
          path: openms-install
          key: openms-${{ matrix.name }}-${{ env.OPENMS_TAG }}-v1

      - name: Check out OpenMS and contrib
        if: steps.openms-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch $env:OPENMS_TAG https://github.com/OpenMS/OpenMS.git openms-src
          git clone --depth 1 https://github.com/OpenMS/contrib.git contrib-src

      - name: Build contrib
        if: steps.openms-cache.outputs.cache-hit != 'true'
        run: |
          cmake -S contrib-src -B contrib-build -DBUILD_TYPE=ALL -DNUMBER_OF_JOBS=4
          cmake --build contrib-build --config Release

      - name: Build OpenMS
        if: steps.openms-cache.outputs.cache-hit != 'true'
        run: |
          # GUI off: FasTag needs the library only, and Qt would roughly double
          # an already long build.
          cmake -S openms-src -B openms-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DOPENMS_CONTRIB_LIBS="${{ github.workspace }}/contrib-build" `
            -DWITH_GUI=OFF `
            -DENABLE_TUTORIALS=OFF `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/openms-install"
          cmake --build openms-build --config Release --target install --parallel 4

      - name: Verify OpenMS ships development files
        shell: bash
        run: |
          CFG=$(find openms-install -name 'OpenMSConfig.cmake' 2>/dev/null | head -1)
          if [ -z "$CFG" ]; then
            echo "::error::No OpenMSConfig.cmake after install."
            exit 1
          fi
          echo "OPENMS_DIR=$(dirname "$CFG")" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          # Same Eigen3 range shim as the conda jobs; see the comment there.
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DOpenMS_DIR="$env:OPENMS_DIR" `
            -DEigen3_DIR="${{ github.workspace }}/cmake/eigen3-range-shim"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - uses: actions/upload-artifact@v4
        with:
          name: FasTag-${{ matrix.name }}
          path: build/Release/FasTag.exe
          if-no-files-found: error
