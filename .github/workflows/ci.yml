name: build

# Linux x64/arm64 and macOS x64/arm64, tests included.
#
# These platforms USED to install OpenMS from bioconda in seconds. They no
# longer can: bioconda's openms ships MzPeakFile.h but no MZPEAK member in its
# FileTypes enum, so anything built against it silently omits mzPeak. Since
# mzPeak read/write is a shipped feature, OpenMS is now built from source here
# too -- patched with okohlbacher/OpenMS-mzPeakRW -- in its own cached job.
#
# That makes every platform a source build, Windows included (still in
# windows.yml, for the separate reason that it also needs contrib). Cold cost
# is roughly 70 minutes per platform; warm runs restore a 230 MB install and
# cost seconds. The cache key is the pair of pinned dependency SHAs, so the
# only thing that triggers a rebuild is deliberately bumping one of them.
#
# The job VERIFIES that OpenMSConfig.cmake and MzPeakFile.h actually exist
# before FasTag configures. Both have been silently absent at some point --
# the header because it was in no CMake list at all -- and each time the
# result was a green build that shipped without the feature.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# cancel-in-progress is ON, after turning it off caused something worse.
#
# The history is worth keeping, because the first diagnosis was wrong. macos-x64
# never executed across six consecutive runs, and that was read as aggressive
# cancellation starving a scarce runner -- so this was set to `false`.
#
# The real cause was that `macos-13` is RETIRED and no runner would ever pick the
# job up. Turning cancellation off did not fix that; it converted a job that
# could not run into a permanent head-of-line block. Run 29857387912 sat `queued`
# on its macos-x64 job holding the refs/heads/main concurrency group, and EVERY
# subsequent push to main was blocked behind it for about a day. The v0.9.0 tag
# build passed only because tags land in a different group.
#
# Two lessons, both encoded below: an unschedulable runner label is a wedge, not
# a delay; and `cancel-in-progress: false` turns any wedge into an outage.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The patched OpenMS that gives FasTag mzPeak read/write.
#
# bioconda's openms has MzPeakFile.h but no MZPEAK in its FileTypes enum, so
# every binary built against it silently omits the format. Getting mzPeak into
# a RELEASE binary therefore means building OpenMS from source -- there is no
# packaged OpenMS anywhere that can read the format.
#
# Pinned by SHA, not branch, on both sides: this is a two-repo dependency and a
# moving ref on either would silently change what the release contains. The
# SHAs are also the cache key, so a bump invalidates exactly the right caches.
env:
  # OpenMS/OpenMS, the commit OpenMS-mzPeakRW's files are written against.
  # Reachable from feature/dia-pseudospectra, NOT from develop -- a plain
  # `git fetch <sha>` is refused by GitHub, hence the --deepen dance below.
  OPENMS_BASE_SHA: bd4b89555629d68b431b189a4c841efbcc4dfeea
  # okohlbacher/OpenMS-mzPeakRW. Currently the fix branch, not main: main still
  # has the two bugs found while integrating this (PR #1) -- Arrow casts that
  # silently drop every precursor, and a header that never installs. Move this
  # to main's SHA once that PR merges.
  MZPEAK_REF: e233ade94856aec9b5b7c61c344614c16aec7084

jobs:
  # ------------------------------------------------------- patched OpenMS
  # Its own job, for the reason windows.yml already documents: actions/cache
  # saves in a post-hook gated on the JOB having succeeded. Building OpenMS in
  # the same job as FasTag means every FasTag-side failure also throws away a
  # ~70-minute OpenMS build, and the next push pays for it again.
  #
  # Splitting it means this job's success -- and therefore its cache save --
  # depends only on OpenMS building, which is the expensive part and the part
  # that does not change between FasTag commits.
  openms:
    name: openms-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64,   runner: ubuntu-24.04 }
          - { name: linux-arm64, runner: ubuntu-24.04-arm }
          - { name: macos-arm64, runner: macos-14 }
          - { name: macos-x64,   runner: macos-15-intel }

    steps:
      - name: Restore patched OpenMS
        id: cache
        uses: actions/cache@v4
        with:
          path: openms-install
          key: openms-mzpeak-${{ matrix.name }}-${{ env.OPENMS_BASE_SHA }}-${{ env.MZPEAK_REF }}-v1

      # Everything below is skipped entirely on a cache hit, which is the
      # normal case: these SHAs only move when the dependency is deliberately
      # bumped, so a warm run costs seconds.
      - name: Fetch OpenMS at the pinned base commit
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git init -q openms-src
          cd openms-src
          git remote add origin https://github.com/OpenMS/OpenMS.git
          # A bare `git fetch origin <sha>` is refused ("couldn't find remote
          # ref") -- GitHub only serves advertised refs. The commit is an
          # ancestor of feature/dia-pseudospectra, so fetch that tip shallow
          # and deepen until the commit is present. --deepen=200 was enough
          # (the commit sits ~170 back); the loop keeps it honest if that
          # distance grows.
          git fetch --depth 1 origin feature/dia-pseudospectra
          for _ in 1 2 3 4 5; do
            if git cat-file -e "$OPENMS_BASE_SHA^{commit}" 2>/dev/null; then break; fi
            git fetch -q --deepen=200 origin feature/dia-pseudospectra
          done
          git cat-file -e "$OPENMS_BASE_SHA^{commit}"
          git checkout -q "$OPENMS_BASE_SHA"

      - name: Overlay mzPeak support
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git clone -q https://github.com/okohlbacher/OpenMS-mzPeakRW.git mzpeak-rw
          git -C mzpeak-rw checkout -q "$MZPEAK_REF"
          # src/openms ONLY -- the library, not the TOPP tools or tests that
          # the overlay also carries.
          #
          # FasTag links libOpenMS and nothing else, and one of those tools
          # does not compile on MSVC:
          #
          #   src/topp/DIAPseudoSpectra.cpp(1447):
          #     error C3861: 'omp_set_max_active_levels': identifier not found
          #
          # omp_set_max_active_levels is OpenMP 3.0; MSVC's /openmp implements
          # 2.0 only. Not worth carrying a tool this project never invokes just
          # to hit that, and skipping it keeps the overlay to exactly what
          # mzPeak support needs. src/topp/executables.cmake stays as the base
          # commit has it, so the tool is simply never added to the build.
          # Fail loudly on an unexpected layout rather than silently building a
          # stock OpenMS and shipping binaries with no mzPeak support -- the
          # exact failure mode this whole job exists to prevent.
          test -f mzpeak-rw/src/openms/source/FORMAT/MzPeakFile.cpp
          test -f mzpeak-rw/src/openms/include/OpenMS/FORMAT/MzPeakFile.h
          ( cd mzpeak-rw && git ls-files -z 'src/openms/*' ) \
            | while IFS= read -r -d '' f; do
                mkdir -p "openms-src/$(dirname "$f")"
                cp "mzpeak-rw/$f" "openms-src/$f"
              done
          grep -q MZPEAK openms-src/src/openms/include/OpenMS/FORMAT/FileTypes.h
          grep -q MzPeakFile.h openms-src/src/openms/include/OpenMS/FORMAT/sources.cmake

      - name: Install OpenMS build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: omsbuild
          create-args: >-
            libarrow>=23
            libparquet
            libarrow-dataset
            libarrow-acero
            nlohmann_json
            xerces-c
            libsvm
            eigen
            zlib
            bzip2
            libzip
            hdf5
            libcurl
            libboost-devel
            glpk
            coin-or-cbc
            coin-or-utils
            qt6-main
            cmake
            ninja
            cxx-compiler
          condarc: |
            channels:
              - conda-forge
          init-shell: bash
          cache-environment: true

      - name: Configure OpenMS
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash -el {0}
        run: |
          set -euo pipefail
          # Arrow pinned explicitly to the conda prefix.
          #
          # A system/Homebrew Arrow otherwise wins the search and, being a
          # partial install, fails with "target Parquet::parquet_static not
          # found" during generate. conda-forge ships shared only, hence
          # ARROW_USE_STATIC=OFF; likewise BOOST_USE_STATIC, without which
          # BoostConfig rejects every variant with "No suitable build variant".
          #
          # CMAKE_FIND_FRAMEWORK=LAST is the macOS curl-framework trap this
          # repo already documents for its own build: CMake searches
          # frameworks first, so a third-party /Library/Frameworks/libcurl
          # shadows the SDK libcurl that libOpenMS links, and the result dies
          # at startup with a dangling @rpath. Harmless on Linux.
          cmake -S openms-src -B openms-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/openms-install" \
            -DCMAKE_PREFIX_PATH="$CONDA_PREFIX" \
            -DCMAKE_FIND_FRAMEWORK=LAST \
            -DARROW_USE_STATIC=OFF -DBOOST_USE_STATIC=OFF \
            -DArrow_DIR="$CONDA_PREFIX/lib/cmake/Arrow" \
            -DParquet_DIR="$CONDA_PREFIX/lib/cmake/Parquet" \
            -DArrowDataset_DIR="$CONDA_PREFIX/lib/cmake/ArrowDataset" \
            -DArrowAcero_DIR="$CONDA_PREFIX/lib/cmake/ArrowAcero" \
            -DQT_HOST_PATH="$CONDA_PREFIX" \
            -DWITH_GUI=OFF -DENABLE_DOCS=OFF -DENABLE_UPDATE_CHECK=OFF \
            -DHAS_XSERVER=OFF

      - name: Build the OpenMS library only
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash -el {0}
        run: |
          set -euo pipefail
          # The library, not the ~200 TOPP executables. FasTag links libOpenMS
          # and nothing else, and building the tools roughly triples this job.
          cmake --build openms-build --target OpenMS

      - name: Install OpenMS
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash -el {0}
        run: |
          set -euo pipefail
          # Two steps, because a plain `cmake --install` walks into src/topp
          # and dies on the executables the step above deliberately did not
          # build -- taking OpenMSConfig.cmake, which is installed AFTER that
          # recursion, down with it.
          #
          # First pass installs what the subdirectories provide (the library,
          # headers, share/OpenMS) and is allowed to fail at src/topp. Second
          # pass runs ONLY the top-level rules -- CMAKE_INSTALL_LOCAL_ONLY
          # suppresses the recursion -- which is where OpenMSConfig.cmake and
          # the exported targets live.
          cmake --install openms-build || true
          cmake -DCMAKE_INSTALL_LOCAL_ONLY=1 -P openms-build/cmake_install.cmake

      - name: Verify the install is usable and has mzPeak
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash -el {0}
        run: |
          set -euo pipefail
          # Guard the two things that were silently wrong when this was first
          # built. MzPeakFile.h in particular was in no CMake list at all, so
          # it compiled and installed cleanly while leaving every downstream
          # consumer without the class (OpenMS-mzPeakRW PR #1).
          for f in lib/cmake/OpenMS/OpenMSConfig.cmake \
                   include/OpenMS/FORMAT/MzPeakFile.h \
                   include/OpenMS/FORMAT/FileTypes.h \
                   share/OpenMS/CV/psi-ms.obo; do
            if [ ! -e "openms-install/$f" ]; then
              echo "::error::patched OpenMS install is missing $f"
              exit 1
            fi
          done
          grep -q MZPEAK openms-install/include/OpenMS/FORMAT/FileTypes.h
          grep -q "void store(" openms-install/include/OpenMS/FORMAT/MzPeakFile.h
          du -sh openms-install

  # ------------------------------------------------------------ FasTag
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: openms
    # write, not the default: needed only for the tag-triggered release-asset
    # upload below. Scoped to this job rather than the workflow, since nothing
    # else here needs it. GitHub already forces a read-only token for
    # pull_request runs from forks regardless of this setting, so it grants
    # nothing to an untrusted PR -- it only ever matters on an actual tag push.
    permissions:
      contents: write
    # A ceiling, not an estimate. Linux finishes in ~4 minutes; this exists so a
    # job that hangs dies rather than holding a concurrency group. It does NOT
    # cover a job stuck waiting for a runner -- GitHub only starts this clock once
    # the job is picked up, which is exactly the case that wedged this repo. The
    # protection against that is not naming labels that do not exist.
    #
    # 90, not 40: the macOS notarization step below has its own 60-minute
    # timeout, which is meaningless if the JOB's overall ceiling kills the run
    # first. A job that never reaches signing (every non-tag push, and Linux
    # always) still finishes in minutes regardless -- this only widens how
    # long something is allowed to hang, not how long anything normally takes.
    # NOTE: this does not cover the documented one-time exception where a
    # brand-new bundle ID's FIRST notarization submission can take 8-12 hours
    # (see doc/BACKLOG-ci.md) -- that has to be primed manually, out of band,
    # before the first real signed release, exactly as the reference project
    # that pattern came from does it.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # `extra` carries per-platform conda packages on top of the shared
          # OpenMS runtime set. macOS asks for llvm-openmp explicitly because
          # Apple's clang ships no OpenMP runtime.
          #
          # It is already present TRANSITIVELY -- run 29891819334 found OpenMP 5.1
          # on macos-arm64 without asking, because libopenblas pulls llvm-openmp
          # in. That is luck, not a guarantee: nothing in this repo depends on
          # OpenMS continuing to depend on openblas. Naming it makes a property
          # the build currently holds by accident into one it holds by contract.
          #
          # Linux gets OpenMP from the gcc toolchain; adding llvm-openmp there
          # risks clashing with libgomp. patchelf is the release-packaging
          # step's tool for rewriting RPATH to a relative, portable location.
          - { name: linux-x64,   runner: ubuntu-24.04,     extra: "patchelf" }
          - { name: linux-arm64, runner: ubuntu-24.04-arm, extra: "patchelf" }
          # macos-arm64 is not speculative: it PASSED in run 29857387912, in the
          # same matrix whose macos-x64 job wedged the queue. bioconda ships
          # osx-arm64 OpenMS 3.5.0, and QT_HOST_PATH below is what it needed.
          #
          # dylibbundler (the macOS equivalent of patchelf above) is NOT here:
          # `dylibbundler =* * does not exist` -- it is a Homebrew package, not
          # a conda-forge one. Installed via `brew install` in its own step
          # instead, further down.
          - { name: macos-arm64, runner: macos-14, extra: "llvm-openmp" }
          # Intel macOS. `macos-13` is retired -- established, not suspected, and
          # the cause of the outage described above. macos-15-intel is GitHub's
          # replacement label; it schedules and passes. If it is ever retired in
          # turn, DROP the target rather than leave it amber: an untested platform
          # that looks merely "queued" is the more dangerous of the two states,
          # which is the whole lesson of this file.
          - { name: macos-x64,   runner: macos-15-intel, extra: "llvm-openmp" }

    steps:
      - uses: actions/checkout@v4

      # Two dependencies OpenMSConfig.cmake needs but the openms package does not
      # pull in. Both were invisible locally, where contrib had already provided
      # them, and both broke immediately on a clean machine:
      #
      #   libboost-headers  OpenMS/config.h is public and does
      #                     #include <boost/current_function.hpp>, so every
      #                     downstream translation unit needs Boost headers
      #   qt6-main          OpenMSConfig.cmake does find_dependency(Qt6). The
      #                     env otherwise has a Qt6Config.cmake that sets
      #                     Qt6_FOUND=FALSE -- present but incomplete, which
      #                     reads as a confusing "found but not found"
      #
      # linux-x64 passed without qt6-main and the ARM/macOS runners did not, so
      # the base image differs by platform. Requesting it explicitly removes the
      # dependence on whatever the runner happens to ship.
      - name: Restore patched OpenMS
        uses: actions/cache@v4
        with:
          path: openms-install
          key: openms-mzpeak-${{ matrix.name }}-${{ env.OPENMS_BASE_SHA }}-${{ env.MZPEAK_REF }}-v1
          fail-on-cache-miss: true

      # The RUNTIME half of what the openms job built against, plus FasTag's own
      # toolchain. libOpenMS links Arrow, Qt, Xerces and the rest dynamically,
      # so they have to be present here too -- not just where it was compiled.
      #
      # dylibbundler is NOT here: it is a Homebrew package, not a conda-forge
      # one (`dylibbundler =* * does not exist`), and is installed by brew in
      # its own step further down. patchelf, its Linux counterpart, IS a real
      # conda-forge package.
      - name: Install toolchain and OpenMS runtime dependencies
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: fastag
          create-args: >-
            libarrow>=23
            libparquet
            libarrow-dataset
            libarrow-acero
            nlohmann_json
            xerces-c
            libsvm
            eigen
            zlib
            bzip2
            libzip
            hdf5
            libcurl
            libboost-devel
            glpk
            coin-or-cbc
            coin-or-utils
            qt6-main
            cmake
            ninja
            cxx-compiler
            ${{ matrix.extra }}
          condarc: |
            channels:
              - conda-forge
          init-shell: bash
          cache-environment: true

      - name: Point the build at the patched OpenMS
        shell: bash -el {0}
        run: |
          set -euo pipefail
          CFG="$PWD/openms-install/lib/cmake/OpenMS/OpenMSConfig.cmake"
          if [ ! -f "$CFG" ]; then
            echo "::error::restored OpenMS cache has no OpenMSConfig.cmake"
            ls -la openms-install/lib/cmake/OpenMS 2>/dev/null || true
            exit 1
          fi
          echo "OPENMS_DIR=$(dirname "$CFG")" >> "$GITHUB_ENV"
          # Every downstream step needs the library and its shared-data
          # directory; the tests and the smoke run both load CV terms.
          echo "OPENMS_INSTALL=$PWD/openms-install" >> "$GITHUB_ENV"
          echo "OPENMS_DATA_PATH=$PWD/openms-install/share/OpenMS" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash -el {0}
        run: |
          # pipefail, because the cmake line below is piped into tee.
          #
          # This shell is `bash -el`, which has errexit but NOT pipefail, so a
          # pipeline reports the exit status of its LAST command -- tee, which
          # essentially always succeeds. Without this, a failed configure would be
          # swallowed and the job would march on to Build and fail there with a
          # far more confusing error. GitHub's default shell sets pipefail; this
          # one was written explicitly and does not.
          set -o pipefail

          # Eigen3 needs the shim this repo already ships.
          #
          # OpenMSConfig.cmake does find_dependency(Eigen3 3.4.0...<6). Eigen 3.4's
          # own config-version file enforces same-major-version and rejects any
          # range whose maximum crosses 4, so a perfectly good Eigen 3.4.0 is
          # refused and configuration dies before OpenMS's fallback can run. It is
          # the first thing CI hit, on every platform.
          #
          # README.md documented this and cmake/eigen3-range-shim existed; the
          # first CI attempt simply failed to use it. Passing it unconditionally
          # is harmless where Eigen behaves, and this is exactly the sort of
          # environment-specific breakage CI is meant to catch for new users.
          # QT_HOST_PATH is required on the ARM runners and harmless elsewhere.
          #
          # conda-forge's Qt6 for aarch64 and osx-arm64 is marked as a
          # cross-compiled Qt, so Qt6Config.cmake refuses to load without a host
          # Qt: "To use a cross-compiled Qt, please set the QT_HOST_PATH cache
          # variable". The build here is native, so the same prefix IS the host
          # Qt. linux-x64 is unaffected, which is why this only appeared on ARM.
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenMS_DIR="$OPENMS_DIR" \
            -DCMAKE_PREFIX_PATH="$CONDA_PREFIX" \
            -DQT_HOST_PATH="$CONDA_PREFIX" \
            -DEigen3_DIR="$PWD/cmake/eigen3-range-shim" \
            -DEIGEN3_INCLUDE_DIR="$CONDA_PREFIX/include/eigen3" 2>&1 | tee configure.log

      - name: Verify OpenMP was found
        shell: bash -el {0}
        run: |
          # Without this, macOS goes GREEN while shipping a serial binary.
          #
          # Missing OpenMP is not a build error. CMakeLists.txt warns and carries
          # on, the #pragmas become no-ops, the omp_* fallback stubs return 1, and
          # the result is a correct tool that ignores -threads while README.md
          # still advertises ~10x on 16 cores. Every test passes. Apple's clang
          # ships no OpenMP runtime, so macOS is precisely where this would have
          # happened.
          #
          # Asserting on the configure line rather than on the package means this
          # checks the property that matters -- OpenMP was actually FOUND -- and
          # not merely that something was installed.
          #
          # Honest scope: with bioconda's OpenMS this is belt-and-braces, because
          # OpenMSConfig.cmake does find_dependency(OpenMP) and find_package(OpenMS)
          # would fail first. Verified by configuring with
          # -DCMAKE_DISABLE_FIND_PACKAGE_OpenMP=TRUE, which errors with "OpenMS
          # could not be found because dependency OpenMP could not be found"
          # rather than silently building serial. FasTag supports OpenMS >= 3.5
          # generally though, and an OpenMS built without that dependency would
          # reach FasTag's own non-REQUIRED find_package(OpenMP) -- which warns and
          # carries on. Cheap guard, narrower exposure than first assumed.
          if ! grep -q "FasTag: OpenMP" configure.log; then
            echo "::error::OpenMP was not found. The binary would be serial and"
            echo "::error::the performance claims would not hold. Configure said:"
            grep -i "openmp" configure.log || echo "(no OpenMP line at all)"
            exit 1
          fi
          grep "FasTag: OpenMP" configure.log

      - name: Build
        shell: bash -el {0}
        run: cmake --build build --parallel

      - name: Test
        shell: bash -el {0}
        run: ctest --test-dir build --output-on-failure

      - name: Smoke-test the binary
        shell: bash -el {0}
        run: ./build/FasTag --help

      - uses: actions/upload-artifact@v4
        with:
          name: FasTag-${{ matrix.name }}
          path: build/FasTag
          if-no-files-found: error

      # ---------------------------------------------------------------------
      # Bundle runtime dependencies for portability -- EVERY run, not just
      # releases. This is what a real user's download of an earlier release
      # failed on:
      #
      #   dyld: Library not loaded: @rpath/libOpenMS.dylib
      #     tried: '/Users/runner/micromamba/envs/fastag/lib/libOpenMS.dylib'
      #
      # `build/FasTag` as produced above carries an RPATH pointing at THIS
      # JOB's own conda environment, which obviously does not exist on a
      # machine that only downloaded the release tarball -- true on Linux
      # (RPATH /home/runner/micromamba/envs/fastag/lib) exactly as much as
      # macOS. Running this on every push, not just tags, means a regression
      # here fails CI immediately instead of shipping silently to the next
      # release, which is exactly what happened once already.
      #
      # Two things needed bundling that are easy to miss from a single
      # `ldd`/`otool -L` on the executable alone, both found only by actually
      # running the result and reading the error, not by static inspection:
      #   - Linux only: libblas.so.3/libcblas.so.3/liblapack.so.3/
      #     liblapacke.so.3 are all symlinks to ONE real OpenBLAS file,
      #     loaded via dlopen() rather than a normal NEEDED entry -- invisible
      #     to ldd. conda-forge's BLAS/LAPACK "mutex" package pattern.
      #   - Both platforms: OpenMS's own share/ data directory (enzyme,
      #     modification and CV databases) -- needed even just to fail
      #     cleanly on a missing input file, at least on Linux; bundled on
      #     macOS too rather than relying on an unexplained platform
      #     difference (real local testing showed macOS did not hit this,
      #     but the underlying reason is not understood well enough to trust
      #     it holding on a future OpenMS rebuild). A wrapper script
      #     (FasTag -> FasTag.bin) sets OPENMS_DATA_PATH relative to itself
      #     before exec'ing the real binary, rather than assuming an install
      #     location that does not exist on a bare download.
      - name: Bundle runtime dependencies for portability (Linux)
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: |
          set -e
          rm -rf dist && mkdir -p dist/FasTag/lib
          cp build/FasTag dist/FasTag/FasTag.bin

          # TWO source prefixes now, not one. libOpenMS and libOpenSwathAlgo
          # come from the patched OpenMS install; everything they in turn need
          # (Arrow, Qt, Xerces, BLAS, ...) comes from the conda env. Missing
          # the first would bundle every dependency EXCEPT the one library the
          # tool is actually built around.
          LIBDIR="$CONDA_PREFIX/lib"
          OMSLIB="$OPENMS_INSTALL/lib"

          # Match on ldd's RESOLVED path rather than the soname, so a library
          # is attributed to whichever prefix it actually came from instead of
          # being looked up in a prefix that may not hold it.
          ldd dist/FasTag/FasTag.bin \
            | sed -n 's/.*=> \(\/[^ ]*\).*/\1/p' \
            | grep -E "^($LIBDIR|$OMSLIB)/" | sort -u > /tmp/needed.txt

          while read -r path; do
            [ -z "$path" ] && continue
            name=$(basename "$path")
            if [ -L "$path" ]; then
              real=$(readlink -f "$path")
              realname=$(basename "$real")
              [ -f "dist/FasTag/lib/$realname" ] || cp -L "$real" "dist/FasTag/lib/$realname"
              [ -e "dist/FasTag/lib/$name" ] || ln -s "$realname" "dist/FasTag/lib/$name"
            else
              [ -f "dist/FasTag/lib/$name" ] || cp -L "$path" "dist/FasTag/lib/$name"
            fi
          done < /tmp/needed.txt

          # dlopen-only BLAS/LAPACK backend aliases -- see the comment above.
          for alias in libblas.so.3 libcblas.so.3 liblapack.so.3 liblapacke.so.3; do
            if [ -L "$LIBDIR/$alias" ] && [ ! -e "dist/FasTag/lib/$alias" ]; then
              real=$(readlink -f "$LIBDIR/$alias")
              realname=$(basename "$real")
              [ -f "dist/FasTag/lib/$realname" ] || cp -L "$real" "dist/FasTag/lib/$realname"
              ln -s "$realname" "dist/FasTag/lib/$alias"
            fi
          done

          patchelf --set-rpath '$ORIGIN/lib' dist/FasTag/FasTag.bin
          for so in dist/FasTag/lib/*.so*; do
            [ -L "$so" ] && continue
            patchelf --set-rpath '$ORIGIN' "$so" 2>/dev/null || true
          done

          cp -r "$OPENMS_INSTALL/share/OpenMS" dist/FasTag/share-OpenMS
          # printf, not a heredoc: a heredoc's body has to be indented to
          # satisfy YAML's block-scalar rules, but leading whitespace before
          # `#!` breaks shebang recognition -- the kernel requires it at byte
          # offset 0. Each argument is single-quoted so $HERE/$0/$@ are
          # written LITERALLY, meant for the wrapper script to expand when
          # IT runs later, not for this outer shell to expand now.
          printf '%s\n' \
            '#!/bin/sh' \
            'HERE=$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)' \
            'export OPENMS_DATA_PATH="$HERE/share-OpenMS"' \
            'exec "$HERE/FasTag.bin" "$@"' \
            > dist/FasTag/FasTag
          chmod +x dist/FasTag/FasTag dist/FasTag/FasTag.bin
          du -sh dist/FasTag

      - name: Install dylibbundler (macOS)
        if: runner.os == 'macOS'
        run: brew install dylibbundler

      - name: Bundle runtime dependencies for portability (macOS)
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: |
          set -e
          rm -rf dist && mkdir -p dist/FasTag
          cp build/FasTag dist/FasTag/FasTag.bin

          dylibbundler -od -b \
            -x dist/FasTag/FasTag.bin \
            -d dist/FasTag/lib \
            -p '@executable_path/lib/' \
            -s "$OPENMS_INSTALL/lib" \
            -s "$CONDA_PREFIX/lib"

          # Deduplicate LC_RPATH on EVERY Mach-O in the bundle, or dyld
          # refuses to launch:
          #
          #   Library not loaded: @executable_path/lib/libOpenMS.dylib
          #   tried: '.../dist/FasTag/lib/libOpenMS.dylib'
          #         (duplicate LC_RPATH '@executable_path/lib/')
          #
          # dylibbundler rewrites each existing rpath to its -p prefix
          # INDIVIDUALLY, so a file carrying several collapses to several
          # identical entries. libOpenMS.dylib had three:
          #
          #   -rpath ".../envs/omsbuild/lib"    "@executable_path/lib/"
          #   -rpath ".../openms-build/lib"     "@executable_path/lib/"
          #   -rpath "@executable_path/../lib/" "@executable_path/lib/"
          #
          # and a duplicate LC_RPATH is fatal, not cosmetic. This got worse
          # with the move to a separately-installed OpenMS, which is simply
          # one more prefix for dylibbundler to collapse. The first fix here
          # only cleaned the executable and missed the library that actually
          # had the problem -- hence "every Mach-O", not a list of suspects.
          dedup_rpath() {
            local f="$1"
            while [ "$(otool -l "$f" \
                        | awk '/LC_RPATH/{g=1;next} g&&/^ *path /{print $2; g=0}' \
                        | grep -cx '@executable_path/lib/')" -gt 1 ]; do
              install_name_tool -delete_rpath '@executable_path/lib/' "$f"
            done
            # install_name_tool invalidates the signature it just edited, and
            # arm64 will not run an improperly signed Mach-O at all. Re-sign
            # ad-hoc; the real Developer ID signing step downstream overwrites
            # this anyway when it is configured.
            codesign --force --sign - "$f" 2>/dev/null || true
          }
          dedup_rpath dist/FasTag/FasTag.bin
          for so in dist/FasTag/lib/*.dylib; do
            [ -e "$so" ] || continue
            [ -L "$so" ] && continue
            dedup_rpath "$so"
          done
          echo "LC_RPATH on FasTag.bin after dedup:"
          otool -l dist/FasTag/FasTag.bin \
            | awk '/LC_RPATH/{g=1;next} g&&/^ *path /{print "  " $2; g=0}'
          echo "LC_RPATH on libOpenMS.dylib after dedup:"
          otool -l dist/FasTag/lib/libOpenMS.dylib \
            | awk '/LC_RPATH/{g=1;next} g&&/^ *path /{print "  " $2; g=0}'

          cp -r "$OPENMS_INSTALL/share/OpenMS" dist/FasTag/share-OpenMS
          # printf, not a heredoc: a heredoc's body has to be indented to
          # satisfy YAML's block-scalar rules, but leading whitespace before
          # `#!` breaks shebang recognition -- the kernel requires it at byte
          # offset 0. Each argument is single-quoted so $HERE/$0/$@ are
          # written LITERALLY, meant for the wrapper script to expand when
          # IT runs later, not for this outer shell to expand now.
          printf '%s\n' \
            '#!/bin/sh' \
            'HERE=$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)' \
            'export OPENMS_DATA_PATH="$HERE/share-OpenMS"' \
            'exec "$HERE/FasTag.bin" "$@"' \
            > dist/FasTag/FasTag
          chmod +x dist/FasTag/FasTag dist/FasTag/FasTag.bin
          du -sh dist/FasTag

      # The actual regression guard: run the bundle exactly the way a user
      # who only downloaded the tarball would, and fail the build if it
      # resolves anything from this job's own build environment. Deliberately
      # NOT `bash -el {0}` -- that activates the conda env, which is exactly
      # the crutch a real download does not have. `-in nonexistent.mzML`
      # needs no test fixture: reaching OpenMS's own "file not found" error
      # proves every library AND the shared data directory resolved
      # correctly, since both are needed before that check ever runs.
      - name: Verify the bundle is portable (regression guard)
        shell: bash
        run: |
          set -e
          unset LD_LIBRARY_PATH DYLD_LIBRARY_PATH DYLD_FALLBACK_LIBRARY_PATH CONDA_PREFIX
          OUT=$(cd /tmp && "$GITHUB_WORKSPACE/dist/FasTag/FasTag" -in nonexistent.mzML -out /tmp/portability-check.tsv 2>&1) || true
          echo "$OUT"
          if echo "$OUT" | grep -qiE "library not loaded|cannot open shared object|shared data|dyld|error while loading"; then
            echo "::error::Bundle is NOT portable -- still resolves something from the build environment. See output above."
            exit 1
          fi
          echo "$OUT" | grep -q "File not found" || { echo "::error::Unexpected output -- never reached the expected 'file not found' error."; exit 1; }

          # And that the SHIPPED artifact still has mzPeak. Everything above
          # only exercises mzML, so a bundle whose mzPeak support quietly
          # vanished -- a stray OpenMS, a header that stopped installing, a
          # missing Arrow -- would sail through it. Both of the upstream bugs
          # this feature hit presented exactly that way: a green build that
          # shipped without the format.
          #
          # A build WITHOUT mzPeak rejects the extension at parameter
          # validation ("invalid file extension"), because setValidFormats_
          # never listed it; a build WITH it accepts the name and fails on the
          # missing file instead. So reaching "File not found" here is the
          # assertion.
          OUT2=$(cd /tmp && "$GITHUB_WORKSPACE/dist/FasTag/FasTag" -in nonexistent.mzpeak -out /tmp/mzpeak-check.tsv 2>&1) || true
          echo "$OUT2"
          echo "$OUT2" | grep -q "File not found" || {
            echo "::error::Shipped bundle does not accept .mzpeak -- mzPeak support is missing from the release artifact."
            exit 1
          }

          # The Arrow/Parquet stack has to have travelled with it, since that
          # is what actually reads the format once a real file is given.
          ls dist/FasTag/lib | grep -qi 'arrow' || { echo "::error::no Arrow library in the bundle"; exit 1; }
          ls dist/FasTag/lib | grep -qi 'parquet' || { echo "::error::no Parquet library in the bundle"; exit 1; }

          echo "Portability check passed: runs standalone, no build-environment leakage, mzPeak present."

      # ---------------------------------------------------------------------
      # macOS code signing + notarization, release builds only.
      #
      # Adapted from a working reference (BALL/BALLView's release.yml), not
      # invented -- but that project ships a Qt .app bundle via macdeployqt
      # and a signed .dmg via create-dmg; FasTag ships a bundled folder, not
      # an .app, so none of that packaging machinery applies, and one thing
      # does NOT carry over: `stapler staple` only works on .app bundles,
      # .pkg installers and disk images, never a lone Mach-O binary or a
      # plain folder -- Apple's own documented limitation, not an oversight
      # here. A notarized standalone binary is verified by Gatekeeper via an
      # ONLINE ticket lookup on first run instead, which needs network
      # access that one time. There is no staple step below because there is
      # nothing for it to attach to.
      #
      # Gated the same way as the release-upload step above and the
      # SignPath step in windows.yml: `secrets.X != ''` directly in an `if:`
      # makes the WHOLE workflow invalid (a 0-job startup_failure on every
      # push), so the secret is mapped into a step env: (legal) and the
      # presence check becomes a step OUTPUT that downstream steps gate on.
      #
      # UNTESTED until MACOS_* secrets exist on this repo -- none do yet, so
      # every tag build takes the "not configured" branch and ships
      # unsigned, same as today. See doc/BACKLOG-ci.md for exactly what is
      # needed and how to get it.
      - name: Detect macOS signing readiness
        if: (matrix.name == 'macos-arm64' || matrix.name == 'macos-x64') && startsWith(github.ref, 'refs/tags/v')
        id: mac-signing
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -z "$MACOS_CERTIFICATE_BASE64" ]; then
            echo "::warning title=Unsigned macOS binary::MACOS_CERTIFICATE_BASE64 is not set -- shipping this release unsigned. Gatekeeper will warn on first run. See doc/BACKLOG-ci.md for what's needed."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple Developer ID cert into CI keychain (macOS)
        if: steps.mac-signing.outputs.enabled == 'true'
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          # Ephemeral keychain, never the runner's login keychain.
          KEYCHAIN_PATH="${RUNNER_TEMP}/fastag-signing.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/cert.p12"
          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"' | xargs)
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -p codesigning -v "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      # Every dylib first, THEN the executable: codesigning it checks its
      # dependencies' own signatures too, so they need a real signature in
      # place beforehand -- dylibbundler's own internal codesign call uses an
      # ad-hoc identity ("-"), which notarization does not accept.
      - name: Codesign FasTag with Developer ID + hardened runtime (macOS)
        if: steps.mac-signing.outputs.enabled == 'true'
        shell: bash
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          for dylib in dist/FasTag/lib/*.dylib; do
            [ -L "$dylib" ] && continue
            codesign --force --options runtime --sign "$MACOS_SIGNING_IDENTITY" --timestamp "$dylib"
          done
          codesign --force --options runtime --sign "$MACOS_SIGNING_IDENTITY" --timestamp dist/FasTag/FasTag.bin
          codesign --verify --strict --verbose=2 dist/FasTag/FasTag.bin

      - name: Submit to Apple notary + wait (macOS)
        if: steps.mac-signing.outputs.enabled == 'true'
        timeout-minutes: 60
        shell: bash
        env:
          MACOS_APPLE_ID: ${{ secrets.MACOS_APPLE_ID }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          ditto -c -k --keepParent dist/FasTag "${RUNNER_TEMP}/FasTag-notarize.zip"
          xcrun notarytool submit "${RUNNER_TEMP}/FasTag-notarize.zip" \
            --apple-id "$MACOS_APPLE_ID" --team-id "$MACOS_TEAM_ID" \
            --password "$MACOS_NOTARY_PASSWORD" --wait

      # BALL's own release.yml has no equivalent teardown -- its runner is
      # simply discarded after the job, which is why the keychain never
      # outlives it either way. Added anyway, cheap and slightly more
      # careful than the reference: if a later step were ever added after
      # this one, it would not inherit a non-default keychain search order.
      - name: Delete signing keychain (macOS)
        if: always() && steps.mac-signing.outputs.enabled == 'true'
        shell: bash
        run: security delete-keychain "${RUNNER_TEMP}/fastag-signing.keychain-db" || true

      # Filenames deliberately carry no version: the README links
      # /releases/latest/download/FasTag-<platform>.tar.gz, a GitHub URL form
      # that always resolves to whatever the newest release's file of that
      # name is. Each new tag's build overwrites the same name inside its OWN
      # release, so nothing else needs to change when this table gets a new
      # row.
      #
      # `gh release create ... || true`: this job runs once per matrix entry,
      # so whichever platform's build finishes first creates the release (a
      # placeholder, if the real notes have not been written yet -- edited in
      # afterward without touching assets); every later entry's create call
      # fails harmlessly because it already exists, then --clobber lets each
      # attach its own binary regardless of arrival order.
      #
      # Archives the WHOLE dist/FasTag/ folder now, not a single file: users
      # run FasTag/FasTag (the wrapper), not the FasTag.bin it execs.
      - name: Attach binary to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash -el {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Automated binary upload; release notes pending." \
            2>/dev/null || true
          tar -C dist -czf "FasTag-${{ matrix.name }}.tar.gz" FasTag
          gh release upload "${{ github.ref_name }}" "FasTag-${{ matrix.name }}.tar.gz" --clobber
