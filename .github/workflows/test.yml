name: tests
on: [push, pull_request]
jobs:
  core:
    # The algorithm core has no dependencies, so CI can verify it without an
    # OpenMS build. The TOPP wrapper is not built here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DFASTAG_BUILD_TOOL=OFF
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure
