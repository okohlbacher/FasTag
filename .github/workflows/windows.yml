name: windows

# Windows, separate from build.yml on purpose.
#
# There is no OpenMS conda package for Windows and the official installer
# carries no SDK, so OpenMS is built from source: contrib (Boost, Xerces, etc.)
# then OpenMS itself. ~100 minutes on a cold cache (contrib 37 min, OpenMS
# 63 min, both measured directly), a few minutes once both are cached.
#
# The other four platforms now build OpenMS from source too (ci.yml), since
# shipping mzPeak means patching OpenMS and no packaged build carries it.
# Windows stays in its own workflow because it ALSO needs contrib, which none
# of the others do -- the split is no longer about conda-vs-source. Proven end to end: configure, build, ctest and
# the smoke test all pass. Kept in its own workflow rather than folded into
# build.yml's matrix because of that cost difference, not because it is in
# doubt -- both jobs gate the same as everywhere else (no continue-on-error),
# and it gets its own concurrency group so a slow run cannot repeat the wedge
# described in ci.yml's history.
#
# The recipe is adapted from OpenMS's OWN current CI
# (.github/workflows/openms_ci_matrix_full.yml in OpenMS/OpenMS, read directly
# rather than from documentation, which lags): submodule-pinned contrib,
# Eigen via choco, Qt via jurplel/install-qt-action, Arrow/Parquet/libzip via
# conda, curl built from source into the contrib prefix. What differs is the
# OpenMS configure/build itself -- OpenMS's own CI drives that through
# tools/ci/cibuild.cmake, a ctest -S script that also submits to a CDash server
# this project has no reason to talk to. Replaced here with a plain cmake
# invocation that skips GUI, tests, docs and packaging, since FasTag needs only
# the library, the headers and an installed OpenMSConfig.cmake.
#
# TWO JOBS, not one -- learned the hard way, not designed in up front.
#
# actions/cache's save (a post-hook) is gated on the JOB having succeeded, and
# that check is NOT overridden by continue-on-error at the job level --
# continue-on-error only changes how the WORKFLOW reports the job's outcome,
# not the runtime success() a post-hook's own condition evaluates. The first
# attempt cached contrib and OpenMS in the same job as FasTag's own
# configure/build/test; every time FasTag's side failed, BOTH caches silently
# failed to save (visible as "Post Cache ... = skipped" in the log), so the
# next push repaid the full ~100-minute contrib+OpenMS build to test a one-line
# CMake flag change. This is exactly the reason OpenMS's own CI splits contrib
# into its own job (prepare-contrib-for-windows) rather than caching it inline
# -- a fact this workflow discovered by hitting it, not by reading it off
# OpenMS's CI up front.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # The patched OpenMS that gives FasTag mzPeak read/write -- same two pins as
  # ci.yml, and they must stay in lockstep with it: a release whose Windows
  # binary was built from a different OpenMS than the other four is worse than
  # one that simply lacks the feature.
  #
  # This replaces the old `OPENMS_TAG: release/3.5.0`. mzPeak does not exist on
  # 3.5.0 -- OpenMS-mzPeakRW is written against a commit on
  # feature/dia-pseudospectra -- so shipping the format means moving the base
  # off the release tag.
  OPENMS_BASE_SHA: bd4b89555629d68b431b189a4c841efbcc4dfeea
  MZPEAK_REF: f9c8a72a74ed3418d67eac9d01a1c28f59365cc8
  # The contrib commit the BASE ABOVE pins as a submodule, read directly out of
  # it rather than assumed: `git ls-tree bd4b895556 -- contrib` in a local
  # OpenMS checkout.
  #
  # This used to be release/3.5.0's pointer (4bec7d95...), inherited from when
  # the base was that tag. Moving the base without moving this broke the build
  # twice, in the two ways a stale contrib can:
  #
  #   1. contrib built Arrow 22 while the new base requires >= 23, and
  #      contrib's arrow_static.lib won the search ahead of conda's. Fixed
  #      separately by pinning Arrow_DIR/Parquet_DIR at the conda env in the
  #      configure step -- conda is where OpenMS's own Windows CI gets Arrow
  #      anyway, so that narrows the divergence from their recipe.
  #   2. contrib's Boost 1.81 headers then failed to compile under MSVC 19.44
  #      while building SYSTEM/JavaInfo.cpp:
  #
  #        boost/process/detail/windows/pipe_in.hpp(72):
  #          error C3878: syntax error: unexpected token 'ec' following
  #                       'expression'
  #          error C7510: 'error_code': use of dependent type name must be
  #                       prefixed with 'typename'
  #
  # (2) is not workaroundable from here -- the base simply wants a different
  # contrib -- so this is now derived from the base itself, which is the same
  # method the original pin used, just applied to the base actually built.
  # Changing it invalidates the contrib cache and costs one ~37-minute rebuild.
  CONTRIB_REV: 186aacfbc1157719735b497cd6de1b3e83289eea

jobs:
  # ---------------------------------------------------------- OpenMS itself
  #
  # Builds and caches contrib + the OpenMS install. Touches nothing
  # FasTag-specific, so a FasTag-side failure downstream can never suppress
  # these caches' save step the way the single-job version did.
  windows-x64-openms:
    name: windows-x64-openms
    runs-on: windows-2022
    # contrib measured at 37 min, OpenMS itself at 63 min on the first clean
    # run; generous headroom above that, not a tuned estimate.
    timeout-minutes: 180

    steps:
      # OpenMS contrib's CMakeLists shells out to cl.exe to decide the target
      # word size and fails with "Could not determine if cl.exe builds x86 or
      # x64 apps" without this -- found the hard way earlier in this project's
      # CI history (see ci.yml). Persists to every later step regardless of
      # shell, since it writes to GITHUB_PATH/GITHUB_ENV.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Check out OpenMS at the pinned base commit
        shell: bash
        run: |
          set -euo pipefail
          git init -q openms-src
          cd openms-src
          git remote add origin https://github.com/OpenMS/OpenMS.git
          # A bare `git fetch origin <sha>` is refused ("couldn't find remote
          # ref") -- GitHub only serves advertised refs. The commit is an
          # ancestor of feature/dia-pseudospectra, so fetch that tip shallow
          # and deepen until it is present.
          git fetch --depth 1 origin feature/dia-pseudospectra
          for _ in 1 2 3 4 5; do
            if git cat-file -e "$OPENMS_BASE_SHA^{commit}" 2>/dev/null; then break; fi
            git fetch -q --deepen=200 origin feature/dia-pseudospectra
          done
          git cat-file -e "$OPENMS_BASE_SHA^{commit}"
          git checkout -q "$OPENMS_BASE_SHA"

      - name: Overlay mzPeak support
        shell: bash
        run: |
          set -euo pipefail
          git clone -q https://github.com/okohlbacher/OpenMS-mzPeakRW.git mzpeak-rw
          git -C mzpeak-rw checkout -q "$MZPEAK_REF"
          # src/openms ONLY -- the library, not the TOPP tools or tests the
          # overlay also carries. FasTag links libOpenMS and nothing else, and
          # one of those tools does not compile on MSVC:
          #
          #   src/topp/DIAPseudoSpectra.cpp(1447):
          #     error C3861: 'omp_set_max_active_levels': identifier not found
          #
          # omp_set_max_active_levels is OpenMP 3.0; MSVC's /openmp implements
          # 2.0 only. This job builds every target before installing, so unlike
          # ci.yml it cannot simply not-build the tool -- not overlaying it is
          # what keeps it out. src/topp/executables.cmake stays as the base has
          # it, so the tool is never added to the build in the first place.
          #
          # Fail loudly on an unexpected layout rather than silently building a
          # stock OpenMS and shipping a Windows binary with no mzPeak while the
          # other four platforms have it.
          test -f mzpeak-rw/src/openms/source/FORMAT/MzPeakFile.cpp
          test -f mzpeak-rw/src/openms/include/OpenMS/FORMAT/MzPeakFile.h
          ( cd mzpeak-rw && git ls-files -z 'src/openms/*' ) \
            | while IFS= read -r -d '' f; do
                mkdir -p "openms-src/$(dirname "$f")"
                cp "mzpeak-rw/$f" "openms-src/$f"
              done
          grep -q MZPEAK openms-src/src/openms/include/OpenMS/FORMAT/FileTypes.h
          grep -q MzPeakFile.h openms-src/src/openms/include/OpenMS/FORMAT/sources.cmake

      - name: Check out contrib at the pinned commit
        run: |
          git init contrib-src
          cd contrib-src
          git remote add origin https://github.com/OpenMS/contrib.git
          git fetch --depth 1 origin $env:CONTRIB_REV
          git checkout FETCH_HEAD

      - name: Cache contrib build
        id: cache-contrib
        uses: actions/cache@v4
        with:
          path: contrib-build
          key: windows-x64-contrib-${{ env.CONTRIB_REV }}-v1

      - name: Build contrib
        if: steps.cache-contrib.outputs.cache-hit != 'true'
        run: |
          cmake -S contrib-src -B contrib-build -G "Visual Studio 17 2022" -A x64 -DBUILD_TYPE=ALL
          cmake --build contrib-build --config Release

      # Eigen and Ninja via choco, matching OpenMS's own recipe -- OpenMS's
      # Windows CI points Eigen3_DIR at choco's copy rather than contrib's, so
      # contrib's own Eigen (if BUILD_TYPE=ALL even produces one on this
      # platform) is not what is used downstream.
      - name: Install Eigen and Ninja
        run: choco install -y --no-progress eigen ninja

      # qtbase/qtsvg/qtimageformats: OpenMSConfig.cmake does find_dependency(Qt6)
      # even with WITH_GUI=OFF, exactly as it does on the conda platforms (see
      # ci.yml's qt6-main comment) -- Qt is a core-library dependency here, not
      # only a GUI one.
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          cache: 'false'
          archives: 'qtbase qtsvg qtimageformats'

      # Arrow/Parquet/libzip: OpenMS's own Windows CI installs these via conda
      # and adds the env to CMAKE_PREFIX_PATH. bioconda's Linux/macOS `openms`
      # package resolves the equivalent dependency invisibly, as part of the
      # binary package; building from source means supplying it explicitly.
      - name: Install Arrow, Parquet and libzip via conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: fastag-deps
          python-version: '3.11'
          use-mamba: true

      # NO libarrow-dataset / libarrow-acero here, unlike ci.yml.
      #
      # OpenMS makes LibXml2 REQUIRED the moment ArrowDataset is found ("Arrow
      # Dataset (static) may pull in libxml2 symbols; link explicitly"). On
      # Linux and macOS that is free -- their conda envs carry libxml2
      # transitively. On Windows it is not: adding conda's libxml2 did NOT
      # satisfy CMake's FindLibXml2, which wants a layout conda-forge's MSVC
      # build does not present, and configure kept failing with
      # "Could NOT find LibXml2 (missing: LIBXML2_LIBRARY LIBXML2_INCLUDE_DIR)".
      #
      # Dropping the dataset/acero components removes the requirement at its
      # source rather than fighting the find module: find_package(ArrowDataset)
      # is QUIET/optional, nothing here uses Arrow Dataset, and MzPeakFile
      # includes only arrow/api.h, arrow/io/api.h and parquet/arrow/{reader,
      # writer}.h. The asymmetry with ci.yml is deliberate and costs nothing.
      - name: Configure conda packages and paths
        shell: bash -el {0}
        run: |
          conda install -c conda-forge 'libarrow>=23' libparquet libzip nlohmann_json -y
          CONDA_ENV_PREFIX=$(conda info --json | python -c "import json,sys;print(json.load(sys.stdin)['active_prefix'])" | sed 's|\\|/|g')
          echo "CONDA_LIB_PREFIX=$CONDA_ENV_PREFIX/Library" >> "$GITHUB_ENV"

      # Built separately rather than via contrib, mirroring OpenMS's own recipe
      # exactly -- installed into contrib-build so it shares a prefix with
      # everything else contrib produces. CURL_USE_SCHANNEL uses Windows' own
      # TLS instead of pulling in yet another dependency for that alone.
      - name: Build libcurl from source
        shell: bash
        run: |
          curl -L -o curl-src.tar.gz https://curl.se/download/curl-8.12.1.tar.gz
          tar xzf curl-src.tar.gz
          cd curl-8.12.1
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/contrib-build" \
            -DBUILD_SHARED_LIBS=ON \
            -DCURL_USE_SCHANNEL=ON \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF \
            -DCURL_DISABLE_LDAP=ON \
            -DCURL_USE_LIBPSL=OFF
          cmake --build build
          cmake --install build

      - name: Cache OpenMS install
        id: cache-openms
        uses: actions/cache@v4
        with:
          path: openms-install
          key: windows-x64-openms-${{ env.OPENMS_BASE_SHA }}-${{ env.MZPEAK_REF }}-${{ env.CONTRIB_REV }}-v1

      - name: Configure OpenMS
        if: steps.cache-openms.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # GUI, tests, docs and packaging all OFF: FasTag needs the library,
          # the headers and an installed OpenMSConfig.cmake, nothing else. This
          # is the one place this workflow deliberately diverges from OpenMS's
          # own CI recipe rather than mirroring it -- their pipeline builds and
          # tests all of OpenMS itself, which this has no reason to pay for.
          cmake -S openms-src -B openms-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENMS_CONTRIB_LIBS="$GITHUB_WORKSPACE/contrib-build" \
            -DWITH_GUI=OFF \
            -DENABLE_TOPP_TESTING=OFF \
            -DENABLE_CLASS_TESTING=OFF \
            -DENABLE_DOCS=OFF \
            -DENABLE_STYLE_TESTING=OFF \
            -DENABLE_CWL=OFF \
            -DMT_ENABLE_OPENMP=ON \
            -DUSE_EXTERNAL_JSON=OFF \
            -DEigen3_DIR="C:/ProgramData/chocolatey/lib/eigen/share/cmake" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR;$CONDA_LIB_PREFIX" \
            -DARROW_USE_STATIC=OFF \
            -DArrow_DIR="$CONDA_LIB_PREFIX/lib/cmake/Arrow" \
            -DParquet_DIR="$CONDA_LIB_PREFIX/lib/cmake/Parquet" \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/openms-install"

      - name: Build and install OpenMS
        if: steps.cache-openms.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # No narrower --target: OpenMS's install() rules were not audited for
          # which targets they actually require, and getting that wrong fails at
          # install time having already paid for most of the build. Correctness
          # over speed on a first attempt; worth narrowing once this succeeds
          # once. Measured on the first successful run: 63 minutes.
          cmake --build openms-build --parallel
          cmake --build openms-build --target install

      - name: Verify OpenMS ships development files and mzPeak
        shell: bash
        run: |
          CFG=$(find openms-install -name 'OpenMSConfig.cmake' 2>/dev/null | head -1)
          if [ -z "$CFG" ]; then
            echo "::error::No OpenMSConfig.cmake after install."
            exit 1
          fi
          echo "found: $CFG"
          # MzPeakFile.h specifically, because it was in no CMake list at all
          # at first: it compiled and installed cleanly while leaving every
          # downstream consumer without the class, so FasTag would have gone
          # green here and silently shipped a Windows binary with no mzPeak
          # (OpenMS-mzPeakRW PR #1). The other four platforms check the same.
          HDR=$(find openms-install -name 'MzPeakFile.h' 2>/dev/null | head -1)
          if [ -z "$HDR" ]; then
            echo "::error::patched OpenMS installed without MzPeakFile.h -- mzPeak would be silently missing."
            exit 1
          fi
          echo "found: $HDR"
          grep -q "void store(" "$HDR"

  # ----------------------------------------------------------------- FasTag
  #
  # Everything expensive is a cache restore here, on a run where contrib and
  # OpenMS are already built: choco/Qt/conda still have to be redone since this
  # is a fresh runner, but those are seconds, not the ~100 minutes above.
  windows-x64:
    name: windows-x64
    runs-on: windows-2022
    needs: windows-x64-openms
    # write, not the default: needed only for the tag-triggered release-asset
    # upload below; see ci.yml's identical comment for why this is safe on
    # pull_request runs from forks.
    permissions:
      contents: write
    # 90, not 45: SignPath's release signing policy requires a human to click
    # Approve in SignPath's own UI (wait-for-completion: true blocks on it,
    # deliberately -- an anti-supply-chain control, not a bug), which can take
    # far longer than a normal warm-cache CI run if nobody is at the keyboard.
    # A run that never reaches signing still finishes in minutes regardless.
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          path: fastag

      # $GITHUB_WORKSPACE on Windows is backslash-separated (D:\a\FasTag\FasTag).
      # Concatenating it with a forward-slash suffix (as every path below does)
      # produces a path the filesystem tolerates fine but CMake does not
      # everywhere: CMakeDetermineCompilerABI's generated try_compile scratch
      # CMakeLists.txt embeds CMAKE_MODULE_PATH as a quoted CMake string
      # literal, and CMake's OWN string escaping rejects '\a' as an unknown
      # escape sequence -- "Invalid character escape '\a'". Every path derived
      # from GITHUB_WORKSPACE in this job uses $WS instead, normalized once
      # here rather than patched at each point of use.
      - name: Normalize workspace path to forward slashes
        shell: bash
        run: echo "WS=${GITHUB_WORKSPACE//\\//}" >> "$GITHUB_ENV"

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # Same keys as the prep job -- guaranteed hits, since that job only
      # reaches its own success (and therefore only saves these) once both
      # are already in place.
      - name: Restore contrib build
        uses: actions/cache@v4
        with:
          path: contrib-build
          key: windows-x64-contrib-${{ env.CONTRIB_REV }}-v1

      - name: Restore OpenMS install
        uses: actions/cache@v4
        with:
          path: openms-install
          key: windows-x64-openms-${{ env.OPENMS_BASE_SHA }}-${{ env.MZPEAK_REF }}-${{ env.CONTRIB_REV }}-v1

      - name: Install Eigen and Ninja
        run: choco install -y --no-progress eigen ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          cache: 'false'
          archives: 'qtbase qtsvg qtimageformats'

      - name: Install Arrow, Parquet and libzip via conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: fastag-deps
          python-version: '3.11'
          use-mamba: true

      - name: Configure conda packages and paths
        shell: bash -el {0}
        run: |
          conda install -c conda-forge 'libarrow>=23' libparquet libzip nlohmann_json -y
          CONDA_ENV_PREFIX=$(conda info --json | python -c "import json,sys;print(json.load(sys.stdin)['active_prefix'])" | sed 's|\\|/|g')
          echo "CONDA_LIB_PREFIX=$CONDA_ENV_PREFIX/Library" >> "$GITHUB_ENV"

      - name: Locate OpenMSConfig.cmake
        shell: bash
        run: |
          # OpenMS's Windows install splits one logical CMake package
          # directory across two destinations: <prefix>/CMake/ has only
          # OpenMSConfig(Version).cmake; <prefix>/bin/cmake/OpenMS/ has
          # OpenMSTargets(.cmake|-release.cmake) and Modules/ (FindLIBSVM.cmake
          # etc). The previous three fixes copied Targets INTO CMake/, which
          # was backwards: OpenMSTargets.cmake computes its own _IMPORT_PREFIX
          # by walking a FIXED number of parent directories up from
          # CMAKE_CURRENT_LIST_DIR, a count baked in at generation time to
          # match ITS ORIGINAL install depth (bin/cmake/OpenMS/, three levels
          # under the prefix). Moving the file to CMake/ (one level under the
          # prefix) left that walk overshooting by two levels, landing one
          # directory above the workspace root -- which is exactly the bogus
          # "D:/a/FasTag/bin/OpenSwathAlgo.lib" this chased for three commits;
          # it was never a hardcoded path, it was ${_IMPORT_PREFIX} computed
          # from the wrong location.
          #
          # Fixed the other way around: leave OpenMSTargets.cmake and Modules/
          # exactly where they already are (so _IMPORT_PREFIX and the config's
          # own Modules/ prepend both compute correctly), and copy
          # OpenMSConfig(Version).cmake IN to join them instead. OPENMS_DIR
          # becomes that directory, which is now complete and self-consistent
          # -- and CMAKE_MODULE_PATH no longer needs a separate LIBSVM
          # workaround, since OpenMSConfig.cmake's own
          # list(PREPEND CMAKE_MODULE_PATH "${CMAKE_CURRENT_LIST_DIR}/Modules/")
          # now finds its true sibling Modules/ directly.
          TARGETS_FILE=$(find "$WS/openms-install" -name 'OpenMSTargets.cmake' 2>/dev/null | head -1)
          if [ -z "$TARGETS_FILE" ]; then
            echo "::error::No OpenMSTargets.cmake anywhere in the restored cache."
            exit 1
          fi
          OPENMS_DIR=$(dirname "$TARGETS_FILE")

          CFG=$(find "$WS/openms-install" -name 'OpenMSConfig.cmake' 2>/dev/null | head -1)
          if [ -z "$CFG" ]; then
            echo "::error::No OpenMSConfig.cmake in the restored cache."
            exit 1
          fi
          # NOT piped through xargs: xargs's default quoting treats a
          # backslash as an escape character, and $WS/paths under it can still
          # carry one from an upstream value -- silently corrupting the path
          # rather than erroring, which cost several commits to track down
          # earlier in this same job. Plain command substitution has no such
          # problem.
          cp -v "$CFG" "$(dirname "$CFG")"/OpenMSConfigVersion.cmake "$OPENMS_DIR/"

          echo "OPENMS_DIR=$OPENMS_DIR" >> "$GITHUB_ENV"

      - name: Configure FasTag
        shell: bash
        run: |
          # Same Eigen3 range shim as every other platform; see ci.yml. Qt, the
          # conda prefix AND contrib-build must all be on CMAKE_PREFIX_PATH
          # again here, not only for OpenMS's own build.
          #
          # OpenMSConfig.cmake re-runs find_dependency() for XercesC and every
          # other contrib-built dependency at THIS configure time, using
          # ordinary find_package semantics -- not via OPENMS_CONTRIB_LIBS,
          # which is a hint OpenMS's own CMakeLists reads at ITS configure time
          # and does not thread into the installed config file. Omitting
          # contrib-build here failed with "Failed to find XercesC" on the
          # first real run; that one is fixed by CMAKE_PREFIX_PATH alone. No
          # separate CMAKE_MODULE_PATH is needed for LIBSVM any more -- see the
          # step above.
          #
          # QT_ROOT_DIR (set by jurplel/install-qt-action) is backslash-
          # separated on Windows, same hazard as $GITHUB_WORKSPACE -- normalized
          # here since Qt is only ever consumed at this one point.
          set -x
          QT_FWD="${QT_ROOT_DIR//\\//}"
          cmake -S fastag -B fastag/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenMS_DIR="$OPENMS_DIR" \
            -DCMAKE_PREFIX_PATH="$QT_FWD;$CONDA_LIB_PREFIX;$WS/contrib-build" \
            -DEigen3_DIR="$WS/fastag/cmake/eigen3-range-shim" \
            -DEIGEN3_INCLUDE_DIR="C:/ProgramData/chocolatey/lib/eigen/share/cmake/../../include/eigen3"

      - name: Build FasTag
        shell: bash
        run: cmake --build fastag/build --parallel

      # Build and link both succeeded; every test/benchmark binary that links
      # OpenMS then failed at RUN time with exit code 0xc0000135
      # (STATUS_DLL_NOT_FOUND) -- ranksum_test, which has no OpenMS dependency,
      # passed fine. Windows has no RPATH/RUNPATH equivalent baked into the
      # binary at link time the way Linux/macOS do; the loader only searches
      # the .exe's own directory and PATH. None of OpenMS's, Qt's, contrib's or
      # conda's DLL directories were ever added to PATH, only used as CMake
      # search hints at configure time -- a separate concern the build/link
      # step never needed.
      - name: Add runtime DLL directories to PATH
        shell: bash
        run: |
          echo "$WS/openms-install/bin" >> "$GITHUB_PATH"
          echo "$WS/contrib-build/bin" >> "$GITHUB_PATH"
          echo "$QT_ROOT_DIR/bin" >> "$GITHUB_PATH"
          echo "$CONDA_LIB_PREFIX/bin" >> "$GITHUB_PATH"

      - name: Test
        shell: bash
        run: ctest --test-dir fastag/build --output-on-failure

      - name: Smoke-test the binary
        shell: bash
        run: ./fastag/build/FasTag.exe --help

      - uses: actions/upload-artifact@v4
        with:
          name: FasTag-windows-x64
          path: fastag/build/FasTag.exe
          if-no-files-found: error

      # ---------------------------------------------------------------------
      # Windows Authenticode signing via SignPath Foundation, release builds
      # only. Adapted from a working reference (BALL/BALLView's release.yml)
      # almost directly -- same gating pattern, same action.
      #
      # `secrets.X != ''` directly in an `if:` makes the WHOLE workflow
      # invalid (a 0-job startup_failure on every push), so the secret is
      # mapped into a step env: (legal) and the presence check becomes a step
      # OUTPUT every downstream step gates on -- never `secrets.*` directly.
      #
      # project-slug is a PLACEHOLDER: SignPath Foundation enrollment is
      # per-project, and 'fastag' is only correct if that is the slug this
      # project is actually assigned when enrolled at signpath.org -- verify
      # and edit if not. artifact-configuration-slug 'initial' additionally
      # requires SignPath's own console (not a repo file) to have an
      # artifact configuration under that name expecting a zipped .exe:
      #   <artifact-configuration xmlns="http://signpath.io/artifact-configuration/v1">
      #     <zip-file><pe-file path="*.exe"><authenticode-sign /></pe-file></zip-file>
      #   </artifact-configuration>
      # (actions/upload-artifact always zips, so SignPath receives a .zip
      # regardless -- an artifact-configuration expecting a bare .exe fails
      # with "file does not correspond to the specified file type".)
      #
      # UNTESTED until SIGNPATH_API_TOKEN/SIGNPATH_ORG_ID exist on this repo
      # -- neither does yet, so every tag build takes the "not configured"
      # branch and ships unsigned, same as today. See doc/BACKLOG-ci.md.
      - name: Determine SignPath availability (Windows)
        if: startsWith(github.ref, 'refs/tags/v')
        id: signpath-gate
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          if ([string]::IsNullOrEmpty($env:SIGNPATH_API_TOKEN)) {
            Write-Host "::warning title=Unsigned Windows binary::SIGNPATH_API_TOKEN is not set -- shipping this release unsigned. SmartScreen will warn on first run. See doc/BACKLOG-ci.md for what's needed."
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii
          } else {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii
          }

      - name: Upload unsigned binary for SignPath (Windows)
        if: steps.signpath-gate.outputs.enabled == 'true'
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: FasTag-windows-x64-unsigned
          path: fastag/build/FasTag.exe
          if-no-files-found: error

      - name: Sign via SignPath Foundation (Windows)
        if: steps.signpath-gate.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: 'fastag'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'initial'
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: 'signed'

      - name: Replace unsigned binary with the signed one (Windows)
        if: steps.signpath-gate.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signed = Get-ChildItem -Path "signed" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($signed) {
            Copy-Item -Path $signed.FullName -Destination "fastag/build/FasTag.exe" -Force
            Write-Host "Signed binary in place: $($signed.Name)"
          } else {
            Write-Host "::warning::SignPath step ran but no signed artifact found under signed/"
          }

      # ---------------------------------------------------------------------
      # Bundle runtime dependencies for portability -- EVERY run, not just
      # releases. FasTag.exe as built above depends on DLLs (OpenMS, Qt,
      # contrib's curl/XercesC, conda's Arrow/Parquet) that only exist in
      # THIS job's own build environment; Windows has no RPATH/RUNPATH, so
      # the loader only searches the .exe's own directory and PATH, and
      # nothing on a bare download provides either. The exact same class of
      # bug shipped once already on macOS/Linux (an RPATH pointing at
      # /Users/runner/micromamba/..., discovered only when a real user
      # downloaded the release and ran it) -- fixed there the same way:
      # bundle everything the runtime actually needs, verify it standalone,
      # every push.
      #
      # Order matters not at all here, unlike macOS: Authenticode signs the
      # .exe file itself, so copying unrelated DLLs into the same folder
      # afterward cannot invalidate a signature already applied above --
      # this step runs after signing purely because it needs whichever copy
      # (signed or not) is currently in fastag/build/FasTag.exe.
      #
      # DLL set is deliberately generous rather than minimal: every
      # directory this job itself already needed on PATH to run its OWN
      # ctest/smoke-test (see "Add runtime DLL directories to PATH" above)
      # is copied wholesale, rather than guessing a narrower set with no way
      # to verify it on a machine that actually has Windows.
      #
      # share/OpenMS's location is found by searching rather than assumed:
      # this same install already turned out to split its CMake package
      # across two unrelated directories on this platform (see
      # doc/BACKLOG-ci.md), so trusting a "normal" <prefix>/share/OpenMS
      # layout without checking would be the same mistake twice.
      - name: Bundle runtime dependencies for portability (Windows)
        shell: bash
        run: |
          set -e
          rm -rf dist && mkdir -p dist/FasTag
          cp fastag/build/FasTag.exe dist/FasTag/FasTag.core.exe

          for d in "$WS/openms-install/bin" "$WS/contrib-build/bin" "$QT_ROOT_DIR/bin" "$CONDA_LIB_PREFIX/bin"; do
            [ -d "$d" ] && cp -n "$d"/*.dll dist/FasTag/ 2>/dev/null || true
          done

          SHARE_DIR=$(find "$WS/openms-install" -type d -path '*/share/OpenMS' 2>/dev/null | head -1)
          if [ -z "$SHARE_DIR" ]; then
            echo "::error::Could not find OpenMS's share/ data directory anywhere under openms-install."
            exit 1
          fi
          cp -r "$SHARE_DIR" dist/FasTag/share-OpenMS

          # A .bat wrapper, not a shell script: this is Windows. The real
          # exe is named FasTag.core.exe (not FasTag.exe) specifically so
          # typing the bare command `FasTag` at a prompt resolves to this
          # wrapper via PATHEXT rather than racing it -- if both
          # FasTag.exe and FasTag.bat existed side by side, PATHEXT's
          # default order tries .EXE before .BAT and would silently skip
          # the wrapper.
          printf '%s\r\n' \
            '@echo off' \
            'set "OPENMS_DATA_PATH=%~dp0share-OpenMS"' \
            '"%~dp0FasTag.core.exe" %*' \
            > dist/FasTag/FasTag.bat
          ls dist/FasTag | wc -l

      # Same regression guard as ci.yml, adapted for Windows: no RPATH to
      # strip, so the honest test is running with the DLL search directories
      # this job added to PATH earlier explicitly removed, from a directory
      # outside the build tree. Reaching OpenMS's own "file not found" error
      # proves every DLL AND the shared data directory resolved from the
      # bundle itself, not from this job's PATH.
      - name: Verify the bundle is portable (regression guard)
        shell: bash
        run: |
          set -e
          CLEAN_PATH=$(echo "$PATH" | tr ':' '\n' | grep -viE "openms-install|contrib-build|Qt|conda|miniconda" | tr '\n' ':')
          OUT=$(cd /tmp && PATH="$CLEAN_PATH" "$GITHUB_WORKSPACE/dist/FasTag/FasTag.bat" -in nonexistent.mzML -out /tmp/portability-check.tsv 2>&1) || true
          echo "$OUT"
          if echo "$OUT" | grep -qiE "0xc0000135|not found.*\.dll|shared data"; then
            echo "::error::Bundle is NOT portable -- still resolves something from the build environment. See output above."
            exit 1
          fi
          echo "$OUT" | grep -q "File not found" || { echo "::error::Unexpected output -- never reached the expected 'file not found' error."; exit 1; }
          echo "Portability check passed: runs standalone, no build-environment leakage."

      # Same mechanism as ci.yml's identical step -- see there for why the
      # filename carries no version and why the create-or-fail-harmlessly
      # pattern is safe across two independent workflows racing to attach to
      # the same release. Archives the WHOLE dist/FasTag/ folder now, not a
      # single file: users run FasTag.bat (or bare `FasTag`), not the
      # FasTag.core.exe it calls.
      - name: Attach binary to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --repo explicitly: this job's checkout lives at $WS/fastag (the
          # "path: fastag" above), so $GITHUB_WORKSPACE itself -- this step's
          # default cwd -- has no .git for gh to auto-detect the repo from.
          # Without --repo, both calls below fail with "not a git repository".
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "Automated binary upload; release notes pending." \
            2>/dev/null || true
          # Compress-Archive, not zip: unlike every other tool this workflow
          # already leans on (find, dirname, grep), zip.exe was never actually
          # confirmed present in this runner's Git-for-Windows bundle. Every
          # Windows box has PowerShell, so this has no such gap.
          powershell -NoProfile -Command \
            "Compress-Archive -Path '$WS/dist/FasTag' -DestinationPath 'FasTag-windows-x64.zip' -Force"
          gh release upload "${{ github.ref_name }}" FasTag-windows-x64.zip --clobber \
            --repo "${{ github.repository }}"
