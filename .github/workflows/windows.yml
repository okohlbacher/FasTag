name: windows

# Windows, separate from build.yml on purpose.
#
# There is no OpenMS conda package for Windows and the official installer
# carries no SDK, so OpenMS must be built from source: contrib (Boost, Xerces,
# etc.) then OpenMS itself. That is a different order of magnitude from the
# minutes-long conda path the other four platforms use, and it is UNVERIFIED --
# nobody has confirmed this project builds under MSVC. Keeping it in its own
# workflow means a slow, still-unproven job cannot block or slow down the fast
# jobs that already pass, and it gets its own concurrency group so it cannot
# repeat the wedge described in ci.yml's history.
#
# The recipe is adapted from OpenMS's OWN current CI
# (.github/workflows/openms_ci_matrix_full.yml in OpenMS/OpenMS, read directly
# rather than from documentation, which lags): submodule-pinned contrib,
# Eigen via choco, Qt via jurplel/install-qt-action, Arrow/Parquet/libzip via
# conda, curl built from source into the contrib prefix. What differs is the
# OpenMS configure/build itself -- OpenMS's own CI drives that through
# tools/ci/cibuild.cmake, a ctest -S script that also submits to a CDash server
# this project has no reason to talk to. Replaced here with a plain cmake
# invocation that skips GUI, tests, docs and packaging, since FasTag needs only
# the library, the headers and an installed OpenMSConfig.cmake.
#
# TWO JOBS, not one -- learned the hard way, not designed in up front.
#
# actions/cache's save (a post-hook) is gated on the JOB having succeeded, and
# that check is NOT overridden by continue-on-error at the job level --
# continue-on-error only changes how the WORKFLOW reports the job's outcome,
# not the runtime success() a post-hook's own condition evaluates. The first
# attempt cached contrib and OpenMS in the same job as FasTag's own
# configure/build/test; every time FasTag's side failed, BOTH caches silently
# failed to save (visible as "Post Cache ... = skipped" in the log), so the
# next push repaid the full ~100-minute contrib+OpenMS build to test a one-line
# CMake flag change. This is exactly the reason OpenMS's own CI splits contrib
# into its own job (prepare-contrib-for-windows) rather than caching it inline
# -- a fact this workflow discovered by hitting it, not by reading it off
# OpenMS's CI up front.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENMS_TAG: release/3.5.0
  # The contrib commit release/3.5.0 pins as a submodule, read directly out of
  # that tag rather than assumed: `git ls-tree release/3.5.0 -- contrib` in a
  # local OpenMS checkout. Using this exact commit rather than contrib's own
  # HEAD is deliberate -- a mismatched contrib is a plausible source of build
  # failures that would look like an OpenMS or FasTag bug and is not.
  CONTRIB_REV: 4bec7d958de69ff1201bd6f01a7d67ccaa5ae2bd

jobs:
  # ---------------------------------------------------------- OpenMS itself
  #
  # Builds and caches contrib + the OpenMS install. Touches nothing
  # FasTag-specific, so a FasTag-side failure downstream can never suppress
  # these caches' save step the way the single-job version did.
  windows-x64-openms:
    name: windows-x64-openms
    runs-on: windows-2022
    continue-on-error: true
    # contrib measured at 37 min, OpenMS itself at 63 min on the first clean
    # run; generous headroom above that, not a tuned estimate.
    timeout-minutes: 180

    steps:
      # OpenMS contrib's CMakeLists shells out to cl.exe to decide the target
      # word size and fails with "Could not determine if cl.exe builds x86 or
      # x64 apps" without this -- found the hard way earlier in this project's
      # CI history (see ci.yml). Persists to every later step regardless of
      # shell, since it writes to GITHUB_PATH/GITHUB_ENV.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Check out OpenMS
        run: git clone --depth 1 --branch $env:OPENMS_TAG https://github.com/OpenMS/OpenMS.git openms-src

      - name: Check out contrib at the pinned commit
        run: |
          git init contrib-src
          cd contrib-src
          git remote add origin https://github.com/OpenMS/contrib.git
          git fetch --depth 1 origin $env:CONTRIB_REV
          git checkout FETCH_HEAD

      - name: Cache contrib build
        id: cache-contrib
        uses: actions/cache@v4
        with:
          path: contrib-build
          key: windows-x64-contrib-${{ env.CONTRIB_REV }}-v1

      - name: Build contrib
        if: steps.cache-contrib.outputs.cache-hit != 'true'
        run: |
          cmake -S contrib-src -B contrib-build -G "Visual Studio 17 2022" -A x64 -DBUILD_TYPE=ALL
          cmake --build contrib-build --config Release

      # Eigen and Ninja via choco, matching OpenMS's own recipe -- OpenMS's
      # Windows CI points Eigen3_DIR at choco's copy rather than contrib's, so
      # contrib's own Eigen (if BUILD_TYPE=ALL even produces one on this
      # platform) is not what is used downstream.
      - name: Install Eigen and Ninja
        run: choco install -y --no-progress eigen ninja

      # qtbase/qtsvg/qtimageformats: OpenMSConfig.cmake does find_dependency(Qt6)
      # even with WITH_GUI=OFF, exactly as it does on the conda platforms (see
      # ci.yml's qt6-main comment) -- Qt is a core-library dependency here, not
      # only a GUI one.
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          cache: 'false'
          archives: 'qtbase qtsvg qtimageformats'

      # Arrow/Parquet/libzip: OpenMS's own Windows CI installs these via conda
      # and adds the env to CMAKE_PREFIX_PATH. bioconda's Linux/macOS `openms`
      # package resolves the equivalent dependency invisibly, as part of the
      # binary package; building from source means supplying it explicitly.
      - name: Install Arrow, Parquet and libzip via conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: fastag-deps
          python-version: '3.11'
          use-mamba: true

      - name: Configure conda packages and paths
        shell: bash -el {0}
        run: |
          conda install -c conda-forge libarrow libparquet libzip -y
          CONDA_ENV_PREFIX=$(conda info --json | python -c "import json,sys;print(json.load(sys.stdin)['active_prefix'])" | sed 's|\\|/|g')
          echo "CONDA_LIB_PREFIX=$CONDA_ENV_PREFIX/Library" >> "$GITHUB_ENV"

      # Built separately rather than via contrib, mirroring OpenMS's own recipe
      # exactly -- installed into contrib-build so it shares a prefix with
      # everything else contrib produces. CURL_USE_SCHANNEL uses Windows' own
      # TLS instead of pulling in yet another dependency for that alone.
      - name: Build libcurl from source
        shell: bash
        run: |
          curl -L -o curl-src.tar.gz https://curl.se/download/curl-8.12.1.tar.gz
          tar xzf curl-src.tar.gz
          cd curl-8.12.1
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/contrib-build" \
            -DBUILD_SHARED_LIBS=ON \
            -DCURL_USE_SCHANNEL=ON \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF \
            -DCURL_DISABLE_LDAP=ON \
            -DCURL_USE_LIBPSL=OFF
          cmake --build build
          cmake --install build

      - name: Cache OpenMS install
        id: cache-openms
        uses: actions/cache@v4
        with:
          path: openms-install
          key: windows-x64-openms-${{ env.OPENMS_TAG }}-${{ env.CONTRIB_REV }}-v1

      - name: Configure OpenMS
        if: steps.cache-openms.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # GUI, tests, docs and packaging all OFF: FasTag needs the library,
          # the headers and an installed OpenMSConfig.cmake, nothing else. This
          # is the one place this workflow deliberately diverges from OpenMS's
          # own CI recipe rather than mirroring it -- their pipeline builds and
          # tests all of OpenMS itself, which this has no reason to pay for.
          cmake -S openms-src -B openms-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENMS_CONTRIB_LIBS="$GITHUB_WORKSPACE/contrib-build" \
            -DWITH_GUI=OFF \
            -DENABLE_TOPP_TESTING=OFF \
            -DENABLE_CLASS_TESTING=OFF \
            -DENABLE_DOCS=OFF \
            -DENABLE_STYLE_TESTING=OFF \
            -DENABLE_CWL=OFF \
            -DMT_ENABLE_OPENMP=ON \
            -DUSE_EXTERNAL_JSON=OFF \
            -DEigen3_DIR="C:/ProgramData/chocolatey/lib/eigen/share/cmake" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR;$CONDA_LIB_PREFIX" \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/openms-install"

      - name: Build and install OpenMS
        if: steps.cache-openms.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # No narrower --target: OpenMS's install() rules were not audited for
          # which targets they actually require, and getting that wrong fails at
          # install time having already paid for most of the build. Correctness
          # over speed on a first attempt; worth narrowing once this succeeds
          # once. Measured on the first successful run: 63 minutes.
          cmake --build openms-build --parallel
          cmake --build openms-build --target install

      - name: Verify OpenMS ships development files
        shell: bash
        run: |
          CFG=$(find openms-install -name 'OpenMSConfig.cmake' 2>/dev/null | head -1)
          if [ -z "$CFG" ]; then
            echo "::error::No OpenMSConfig.cmake after install."
            exit 1
          fi
          echo "found: $CFG"

  # ----------------------------------------------------------------- FasTag
  #
  # Everything expensive is a cache restore here, on a run where contrib and
  # OpenMS are already built: choco/Qt/conda still have to be redone since this
  # is a fresh runner, but those are seconds, not the ~100 minutes above.
  windows-x64:
    name: windows-x64
    runs-on: windows-2022
    needs: windows-x64-openms
    continue-on-error: true
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          path: fastag

      # $GITHUB_WORKSPACE on Windows is backslash-separated (D:\a\FasTag\FasTag).
      # Concatenating it with a forward-slash suffix (as every path below does)
      # produces a path the filesystem tolerates fine but CMake does not
      # everywhere: CMakeDetermineCompilerABI's generated try_compile scratch
      # CMakeLists.txt embeds CMAKE_MODULE_PATH as a quoted CMake string
      # literal, and CMake's OWN string escaping rejects '\a' as an unknown
      # escape sequence -- "Invalid character escape '\a'". Every path derived
      # from GITHUB_WORKSPACE in this job uses $WS instead, normalized once
      # here rather than patched at each point of use.
      - name: Normalize workspace path to forward slashes
        shell: bash
        run: echo "WS=${GITHUB_WORKSPACE//\\//}" >> "$GITHUB_ENV"

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # Same keys as the prep job -- guaranteed hits, since that job only
      # reaches its own success (and therefore only saves these) once both
      # are already in place.
      - name: Restore contrib build
        uses: actions/cache@v4
        with:
          path: contrib-build
          key: windows-x64-contrib-${{ env.CONTRIB_REV }}-v1

      - name: Restore OpenMS install
        uses: actions/cache@v4
        with:
          path: openms-install
          key: windows-x64-openms-${{ env.OPENMS_TAG }}-${{ env.CONTRIB_REV }}-v1

      - name: Install Eigen and Ninja
        run: choco install -y --no-progress eigen ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          cache: 'false'
          archives: 'qtbase qtsvg qtimageformats'

      - name: Install Arrow, Parquet and libzip via conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: fastag-deps
          python-version: '3.11'
          use-mamba: true

      - name: Configure conda packages and paths
        shell: bash -el {0}
        run: |
          conda install -c conda-forge libarrow libparquet libzip -y
          CONDA_ENV_PREFIX=$(conda info --json | python -c "import json,sys;print(json.load(sys.stdin)['active_prefix'])" | sed 's|\\|/|g')
          echo "CONDA_LIB_PREFIX=$CONDA_ENV_PREFIX/Library" >> "$GITHUB_ENV"

      - name: Locate OpenMSConfig.cmake
        shell: bash
        run: |
          # The "prefer a sibling OpenMSTargets.cmake" theory was wrong -- no
          # copy of OpenMSConfig.cmake anywhere in the install tree has one
          # next to it, confirmed by that exact search finding nothing on the
          # previous run. Listing both sets in full rather than guessing a
          # third time: either OpenMSTargets.cmake lives somewhere
          # disconnected from every config copy (fixable from here), or it was
          # never installed at all (an OpenMS-side install() gap, fixable only
          # in the prep job).
          echo "--- every OpenMSConfig.cmake ---"
          find "$WS/openms-install" -name 'OpenMSConfig.cmake' 2>&1
          echo "--- every OpenMSTargets.cmake ---"
          find "$WS/openms-install" -name 'OpenMSTargets.cmake' 2>&1
          echo "--- every *Targets*.cmake (in case it is named/versioned differently) ---"
          find "$WS/openms-install" -iname '*Targets*.cmake' 2>&1

          CFG=$(find "$WS/openms-install" -name 'OpenMSConfig.cmake' 2>/dev/null | head -1)
          if [ -z "$CFG" ]; then
            echo "::error::No OpenMSConfig.cmake in the restored cache."
            exit 1
          fi
          echo "OPENMS_DIR=$(dirname "$CFG")" >> "$GITHUB_ENV"

      # OpenMSConfig.cmake.in does
      #   list(PREPEND CMAKE_MODULE_PATH "${CMAKE_CURRENT_LIST_DIR}/Modules/")
      # before find_dependency(LIBSVM 2.91), so this should be automatic -- and
      # is, on Linux/macOS. On this Windows build OpenMS's own install put
      # OpenMSConfig.cmake at <prefix>/CMake/ but FindLIBSVM.cmake at
      # <prefix>/bin/cmake/OpenMS/Modules/, two unrelated directories, so the
      # config's own relative prepend can never reach it. That split is
      # something in OpenMS's own install() rules on this platform, not
      # anything this workflow controls -- confirmed by listing the actual
      # install tree in a prior run rather than guessed. Worked around by
      # finding wherever it landed and adding that directory to
      # CMAKE_MODULE_PATH explicitly, rather than assuming a fixed layout.
      - name: Locate FindLIBSVM.cmake for CMAKE_MODULE_PATH
        shell: bash
        run: |
          # NOT `find ... | xargs dirname`: xargs's default quoting treats a
          # backslash as an escape character, and $GITHUB_WORKSPACE on Windows
          # is backslash-separated (D:\a\FasTag\FasTag) -- piping that through
          # xargs silently mangled it to D:aFasTagFasTag, which then failed to
          # exist and made every previous attempt at this fix a no-op no
          # matter what path was logically correct. Plain command substitution
          # (as OPENMS_DIR already used successfully above) does not have this
          # problem, since nothing re-parses the string as word-split input.
          FOUND=$(find "$WS/openms-install" -iname 'FindLIBSVM.cmake' 2>/dev/null | head -1)
          if [ -z "$FOUND" ]; then
            echo "::error::No FindLIBSVM.cmake anywhere under openms-install."
            exit 1
          fi
          MOD=$(dirname "$FOUND")
          echo "OPENMS_MODULE_PATH=$MOD" >> "$GITHUB_ENV"
          echo "discovered: $MOD"
          ls -la "$MOD"

      - name: Configure FasTag
        shell: bash
        run: |
          # Same Eigen3 range shim as every other platform; see ci.yml. Qt, the
          # conda prefix AND contrib-build must all be on CMAKE_PREFIX_PATH
          # again here, not only for OpenMS's own build.
          #
          # OpenMSConfig.cmake re-runs find_dependency() for XercesC and every
          # other contrib-built dependency at THIS configure time, using
          # ordinary find_package semantics -- not via OPENMS_CONTRIB_LIBS,
          # which is a hint OpenMS's own CMakeLists reads at ITS configure time
          # and does not thread into the installed config file. Omitting
          # contrib-build here failed with "Failed to find XercesC" on the
          # first real run; that one is fixed by CMAKE_PREFIX_PATH alone.
          #
          # CMAKE_MODULE_PATH carries FindLIBSVM.cmake's actual directory (see
          # the step above) -- once loaded, FindLIBSVM.cmake's own find_path/
          # find_library calls are satisfied by contrib-build already being on
          # CMAKE_PREFIX_PATH, so no separate LIBSVM_DIR is needed.
          #
          # -x rather than a plain run: an earlier attempt at this exact fix
          # produced an error with no visibility into whether the intended
          # value actually reached the cmake invocation, and that turned out
          # to matter (see QT_FWD below).
          #
          # QT_ROOT_DIR (set by jurplel/install-qt-action) is ALSO
          # backslash-separated, same hazard as $GITHUB_WORKSPACE -- normalized
          # here since Qt is only ever consumed at this one point.
          set -x
          QT_FWD="${QT_ROOT_DIR//\\//}"
          cmake -S fastag -B fastag/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenMS_DIR="$OPENMS_DIR" \
            -DCMAKE_PREFIX_PATH="$QT_FWD;$CONDA_LIB_PREFIX;$WS/contrib-build" \
            -DCMAKE_MODULE_PATH="$OPENMS_MODULE_PATH" \
            -DEigen3_DIR="$WS/fastag/cmake/eigen3-range-shim" \
            -DEIGEN3_INCLUDE_DIR="C:/ProgramData/chocolatey/lib/eigen/share/cmake/../../include/eigen3"

      - name: Build FasTag
        shell: bash
        run: cmake --build fastag/build --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir fastag/build --output-on-failure

      - name: Smoke-test the binary
        shell: bash
        run: ./fastag/build/FasTag.exe --help

      - uses: actions/upload-artifact@v4
        with:
          name: FasTag-windows-x64
          path: fastag/build/FasTag.exe
          if-no-files-found: error
